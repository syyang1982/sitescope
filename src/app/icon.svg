<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Clipboard base -->
  <rect x="6" y="4" width="20" height="26" rx="2" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="11" y="2" width="10" height="5" rx="1" fill="none" stroke="url(#g)" stroke-width="1.2"/>
  <!-- Report lines -->
  <line x1="10" y1="12" x2="22" y2="12" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="16" x2="19" y2="16" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="20" x2="17" y2="20" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Checkmark for audit pass -->
  <polyline points="10,24 12.5,26.5 17,22" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
